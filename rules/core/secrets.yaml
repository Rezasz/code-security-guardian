rules:
  - id: SECRETS_AWS_ACCESS_KEY
    severity: critical
    category: secrets
    cwe: CWE-798
    languages: []
    extensions: []
    pattern: 'AKIA[0-9A-Z]{16}'
    pattern_type: regex
    pattern_flags: []
    message: "Hardcoded AWS Access Key ID detected."
    fix_hint: "Remove from source. Use IAM roles or environment variables. Rotate the key immediately."
    false_positive_hints:
      - "Test/example key used in documentation"
    references:
      - https://docs.aws.amazon.com/IAM/latest/UserGuide/best-practices.html
    enabled: true
    source: core
    added: 2025-01-15

  - id: SECRETS_AWS_SECRET_KEY
    severity: critical
    category: secrets
    cwe: CWE-798
    languages: []
    extensions: []
    pattern: '(?i)(aws_secret_access_key|aws_secret|SecretAccessKey)\s*[=:]\s*[''"]?([A-Za-z0-9/+]{40})[''"]?'
    pattern_type: regex
    pattern_flags: [IGNORECASE]
    message: "Hardcoded AWS Secret Access Key detected."
    fix_hint: "Use environment variables, AWS Secrets Manager, or IAM roles."
    false_positive_hints:
      - "Documentation example"
    references:
      - https://docs.aws.amazon.com/secretsmanager/latest/userguide/intro.html
    enabled: true
    source: core
    added: 2025-01-15

  - id: SECRETS_PRIVATE_KEY
    severity: critical
    category: secrets
    cwe: CWE-321
    languages: []
    extensions: []
    pattern: '-----BEGIN (RSA |EC |OPENSSH |DSA |PGP )?PRIVATE KEY-----'
    pattern_type: regex
    pattern_flags: []
    message: "Private key material found in source."
    fix_hint: "Remove immediately. Add to .gitignore. Generate a new key pair."
    false_positive_hints:
      - "-----BEGIN CERTIFICATE----- is a public cert, not a private key"
    references:
      - https://cheatsheetseries.owasp.org/cheatsheets/Cryptographic_Storage_Cheat_Sheet.html
    enabled: true
    source: core
    added: 2025-01-15

  - id: SECRETS_STRIPE_LIVE_KEY
    severity: critical
    category: secrets
    cwe: CWE-798
    languages: []
    extensions: []
    pattern: 'sk_live_[0-9a-zA-Z]{24,}'
    pattern_type: regex
    pattern_flags: []
    message: "Stripe live secret key detected."
    fix_hint: "Rotate via Stripe dashboard. Move to environment variable."
    false_positive_hints:
      - "pk_live_ is publishable key — safe to expose"
      - "pk_test_ is test publishable — safe"
      - "sk_test_ is test secret — medium severity only"
    references:
      - https://stripe.com/docs/keys
    enabled: true
    source: core
    added: 2025-01-15

  - id: SECRETS_GITHUB_TOKEN
    severity: critical
    category: secrets
    cwe: CWE-798
    languages: []
    extensions: []
    pattern: '(ghp_[A-Za-z0-9]{36}|gho_[A-Za-z0-9]{36}|ghs_[A-Za-z0-9]{36}|ghu_[A-Za-z0-9]{36}|github_pat_[A-Za-z0-9_]{82})'
    pattern_type: regex
    pattern_flags: []
    message: "GitHub token detected."
    fix_hint: "Revoke via GitHub settings. Store in CI/CD secrets or environment variables."
    false_positive_hints: []
    references:
      - https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens
    enabled: true
    source: core
    added: 2025-01-15

  - id: SECRETS_OPENAI_KEY
    severity: high
    category: secrets
    cwe: CWE-798
    languages: []
    extensions: []
    pattern: 'sk-[A-Za-z0-9]{32,}'
    pattern_type: regex
    pattern_flags: []
    message: "Possible OpenAI API key detected."
    fix_hint: "Rotate via OpenAI dashboard. Use environment variable."
    false_positive_hints:
      - "SSH private key headers can start similarly; verify full pattern"
      - "Skip in test files"
    references:
      - https://platform.openai.com/docs/quickstart/account-setup
    enabled: true
    source: core
    added: 2025-01-15

  - id: SECRETS_ANTHROPIC_KEY
    severity: high
    category: secrets
    cwe: CWE-798
    languages: []
    extensions: []
    pattern: 'sk-ant-[A-Za-z0-9_\-]{32,}'
    pattern_type: regex
    pattern_flags: []
    message: "Anthropic API key detected."
    fix_hint: "Rotate via Anthropic console. Use environment variable."
    false_positive_hints: []
    references:
      - https://docs.anthropic.com/en/api/getting-started
    enabled: true
    source: core
    added: 2025-01-15

  - id: SECRETS_SLACK_TOKEN
    severity: high
    category: secrets
    cwe: CWE-798
    languages: []
    extensions: []
    pattern: 'xox[baprs]-[A-Za-z0-9\-]+'
    pattern_type: regex
    pattern_flags: []
    message: "Slack token detected."
    fix_hint: "Revoke via Slack App settings. Store in environment variables."
    false_positive_hints: []
    references:
      - https://api.slack.com/authentication/token-types
    enabled: true
    source: core
    added: 2025-01-15

  - id: SECRETS_SENDGRID_KEY
    severity: high
    category: secrets
    cwe: CWE-798
    languages: []
    extensions: []
    pattern: 'SG\.[A-Za-z0-9_\-]{22}\.[A-Za-z0-9_\-]{43}'
    pattern_type: regex
    pattern_flags: []
    message: "SendGrid API key detected."
    fix_hint: "Rotate via SendGrid dashboard. Store in environment variable."
    false_positive_hints: []
    references: []
    enabled: true
    source: core
    added: 2025-01-15

  - id: SECRETS_GCP_SERVICE_ACCOUNT
    severity: critical
    category: secrets
    cwe: CWE-798
    languages: []
    extensions: []
    pattern: '"private_key"\s*:\s*"-----BEGIN'
    pattern_type: regex
    pattern_flags: []
    message: "GCP service account private key found in source."
    fix_hint: "Remove from source. Store in Secret Manager or use Workload Identity."
    false_positive_hints: []
    references:
      - https://cloud.google.com/iam/docs/best-practices-for-managing-service-account-keys
    enabled: true
    source: core
    added: 2025-01-15

  - id: SECRETS_DB_URL_POSTGRES
    severity: critical
    category: secrets
    cwe: CWE-798
    languages: []
    extensions: []
    pattern: 'postgres(?:ql)?://[^:@\s]+:[^@\s]+@'
    pattern_type: regex
    pattern_flags: [IGNORECASE]
    message: "PostgreSQL connection string with embedded credentials."
    fix_hint: "Move to environment variable. Use a secrets manager."
    false_positive_hints: []
    references: []
    enabled: true
    source: core
    added: 2025-01-15

  - id: SECRETS_DB_URL_MYSQL
    severity: critical
    category: secrets
    cwe: CWE-798
    languages: []
    extensions: []
    pattern: 'mysql(?:\+[a-z]+)?://[^:@\s]+:[^@\s]+@'
    pattern_type: regex
    pattern_flags: [IGNORECASE]
    message: "MySQL connection string with embedded credentials."
    fix_hint: "Move to environment variable. Use a secrets manager."
    false_positive_hints: []
    references: []
    enabled: true
    source: core
    added: 2025-01-15

  - id: SECRETS_DB_URL_MONGODB
    severity: critical
    category: secrets
    cwe: CWE-798
    languages: []
    extensions: []
    pattern: 'mongodb(?:\+srv)?://[^:@\s]+:[^@\s]+@'
    pattern_type: regex
    pattern_flags: [IGNORECASE]
    message: "MongoDB connection string with embedded credentials."
    fix_hint: "Move to environment variable. Use a secrets manager."
    false_positive_hints: []
    references: []
    enabled: true
    source: core
    added: 2025-01-15

  - id: SECRETS_GENERIC_JWT_SECRET
    severity: critical
    category: secrets
    cwe: CWE-798
    languages: []
    extensions: []
    pattern: '(?i)(jwt_secret|jwtSecret|JWT_SECRET)\s*[=:]\s*["''][^"'']{8,}["'']'
    pattern_type: regex
    pattern_flags: [IGNORECASE]
    message: "Hardcoded JWT secret detected."
    fix_hint: "Use a cryptographically random secret from environment variables (min 256 bits)."
    false_positive_hints:
      - "Value is an environment variable reference like process.env.JWT_SECRET"
    references:
      - https://cheatsheetseries.owasp.org/cheatsheets/JSON_Web_Token_for_Java_Cheat_Sheet.html
    enabled: true
    source: core
    added: 2025-01-15
