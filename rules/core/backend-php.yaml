rules:
  - id: BACKEND_PHP_EVAL
    severity: critical
    category: code-injection
    cwe: CWE-95
    languages: [php]
    extensions: [.php]
    pattern: '\beval\s*\('
    pattern_type: regex
    pattern_flags: []
    message: "eval() with user input allows arbitrary code execution."
    fix_hint: "Remove eval(). Never eval user-supplied data."
    confidence: medium
    false_positive_hints: []
    references: []
    enabled: true
    source: core
    added: 2025-01-15

  - id: BACKEND_PHP_UNSERIALIZE
    severity: critical
    category: unsafe-deserialization
    cwe: CWE-502
    languages: [php]
    extensions: [.php]
    pattern: '\bunserialize\s*\('
    pattern_type: regex
    pattern_flags: []
    message: "unserialize() with untrusted data allows arbitrary code execution."
    fix_hint: "Use json_decode() instead."
    confidence: medium
    false_positive_hints:
      - "Deserializing from a trusted, signed source"
    references: []
    enabled: true
    source: core
    added: 2025-01-15

  - id: BACKEND_PHP_SYSTEM
    severity: critical
    category: command-injection
    cwe: CWE-78
    languages: [php]
    extensions: [.php]
    pattern: '\b(system|exec|passthru|shell_exec)\s*\('
    pattern_type: regex
    pattern_flags: []
    message: "PHP command execution function — command injection risk if args include user input."
    fix_hint: "Use escapeshellarg() on all user input. Prefer not executing shell commands at all."
    confidence: medium
    false_positive_hints:
      - "Called with fully hardcoded arguments"
    references: []
    enabled: true
    source: core
    added: 2025-01-15

  - id: BACKEND_PHP_SQLI_GET
    severity: critical
    category: sql-injection
    cwe: CWE-89
    languages: [php]
    extensions: [.php]
    pattern: '(?:mysql_query|mysqli_query)\s*\([^)]*\$_(?:GET|POST|REQUEST|COOKIE)'
    pattern_type: regex
    pattern_flags: []
    message: "SQL query with direct $_GET/$_POST interpolation — SQL injection."
    fix_hint: "Use PDO with prepared statements."
    confidence: high
    false_positive_hints: []
    references: []
    enabled: true
    source: core
    added: 2025-01-15

  - id: BACKEND_PHP_XSS_ECHO
    severity: high
    category: xss
    cwe: CWE-79
    languages: [php]
    extensions: [.php]
    pattern: 'echo\s+\$_(?:GET|POST|REQUEST|COOKIE)'
    pattern_type: regex
    pattern_flags: []
    message: "Echoing user input without escaping — XSS vulnerability."
    fix_hint: "Use htmlspecialchars($_GET['x'], ENT_QUOTES, 'UTF-8')"
    confidence: high
    false_positive_hints: []
    references: []
    enabled: true
    source: core
    added: 2025-01-15
